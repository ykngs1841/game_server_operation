name: Game Server CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: |
        docker build -t game-server ./docker

    - name: Run Container
      run: |
        docker run -d -p 8080:8080 game-server